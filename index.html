<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Anti-cache meta tags for GitHub Pages -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="app-version" content="2024-01-15-v3-forced" />
    
    <!-- Anti-Flash of Unstyled Content (FOUC) -->
    <style>
      /* Masquer le contenu jusqu'au chargement complet de React */
      html {
        visibility: hidden;
        opacity: 0;
      }
      html.react-loaded {
        visibility: visible;
        opacity: 1;
        transition: opacity 0.15s ease-out;
      }
      /* Le loader de chargement est visible immédiatement */
      #root:empty::before {
        content: '';
        display: block;
        width: 100vw;
        height: 100vh;
        background: #f5f1e8;
      }
    </style>
    
    <title>Cleric Character Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
