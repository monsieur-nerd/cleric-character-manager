<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <defs>
    <!-- Dégradé acier bleu -->
    <linearGradient id="steelBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7fb5"/>
      <stop offset="40%" style="stop-color:#3e5f8f"/>
      <stop offset="100%" style="stop-color:#2a4060"/>
    </linearGradient>
    <!-- Dégradé plus clair pour le relief -->
    <linearGradient id="steelLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7a9fd5"/>
      <stop offset="100%" style="stop-color:#5a7fb5"/>
    </linearGradient>
    <!-- Or -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f"/>
      <stop offset="50%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#9a7b1a"/>
    </linearGradient>
    <!-- Ombre douce -->
    <filter id="softShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- GROUPE PRINCIPAL : Main droite, paume vers nous -->
  <g transform="translate(60, 80)" filter="url(#softShadow)">
    
    <!-- === BRASSARD (partie basse) === -->
    <!-- Forme trapézoïdale pour le poignet -->
    <path d="M -28 35 L 28 35 L 32 75 L -32 75 Z" fill="url(#steelBlue)" stroke="#1a3050" stroke-width="2"/>
    <!-- Bordure dorée haut -->
    <rect x="-28" y="35" width="56" height="6" fill="url(#gold)"/>
    <!-- Bordure dorée bas -->
    <rect x="-32" y="69" width="64" height="6" fill="url(#gold)"/>
    <!-- Ligne centrale décorative -->
    <line x1="0" y1="41" x2="0" y2="69" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="0" cy="55" r="5" fill="url(#gold)"/>
    
    <!-- === PAUME (centre de la main) === -->
    <!-- Base de la main, légèrement arrondie -->
    <ellipse cx="0" cy="5" rx="30" ry="35" fill="url(#steelBlue)" stroke="#1a3050" stroke-width="2"/>
    
    <!-- === POUME (à gauche, légèrement replié) === -->
    <g transform="translate(-32, -5)">
      <!-- Base du pouce -->
      <ellipse cx="0" cy="0" rx="10" ry="18" fill="url(#steelBlue)" stroke="#1a3050" stroke-width="1.5"/>
      <!-- Bout du pouce -->
      <ellipse cx="-2" cy="-20" rx="7" ry="12" fill="url(#steelLight)" stroke="#1a3050" stroke-width="1.5"/>
      <!-- Décoration dorée -->
      <circle cx="0" cy="-5" r="4" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    </g>
    
    <!-- === DOIGTS (espacés naturellement) === -->
    
    <!-- AURICULAIRE (le plus petit, à droite) -->
    <g transform="translate(22, -25)">
      <rect x="-4" y="-25" width="8" height="28" rx="4" fill="url(#steelBlue)" stroke="#1a3050" stroke-width="1.5"/>
      <ellipse cx="0" cy="-28" rx="5" ry="7" fill="url(#steelLight)" stroke="#1a3050" stroke-width="1.5"/>
    </g>
    
    <!-- ANNULAIRE -->
    <g transform="translate(10, -32)">
      <rect x="-4.5" y="-30" width="9" height="35" rx="4" fill="url(#steelBlue)" stroke="#1a3050" stroke-width="1.5"/>
      <ellipse cx="0" cy="-33" rx="5.5" ry="7" fill="url(#steelLight)" stroke="#1a3050" stroke-width="1.5"/>
    </g>
    
    <!-- MAJEUR (le plus long, au centre) -->
    <g transform="translate(-4, -35)">
      <rect x="-5" y="-35" width="10" height="40" rx="5" fill="url(#steelBlue)" stroke="#1a3050" stroke-width="1.5"/>
      <ellipse cx="0" cy="-38" rx="6" ry="8" fill="url(#steelLight)" stroke="#1a3050" stroke-width="1.5"/>
      <!-- Motif central sur le majeur -->
      <circle cx="0" cy="-15" r="3" fill="url(#gold)"/>
    </g>
    
    <!-- INDEX -->
    <g transform="translate(-18, -30)">
      <rect x="-4.5" y="-30" width="9" height="35" rx="4" fill="url(#steelBlue)" stroke="#1a3050" stroke-width="1.5"/>
      <ellipse cx="0" cy="-33" rx="5.5" ry="7" fill="url(#steelLight)" stroke="#1a3050" stroke-width="1.5"/>
    </g>
    
    <!-- === DÉCORATION CENTRALE (dos de la main) === -->
    <!-- Cercle central doré -->
    <circle cx="0" cy="-5" r="12" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <!-- Croix de Torm à l'intérieur -->
    <g stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-10" x2="0" y2="0"/>
      <line x1="-5" y1="-5" x2="5" y2="-5"/>
    </g>
    
    <!-- === JOINTURES DES DOIGTS (détails) === -->
    <g stroke="#1a3050" stroke-width="1" opacity="0.4" fill="none">
      <!-- Jointures paume-doigts -->
      <path d="M -18 -5 Q -18 -10 -18 -15"/> <!-- Index -->
      <path d="M -4 -10 Q -4 -15 -4 -20"/>   <!-- Majeur -->
      <path d="M 10 -7 Q 10 -12 10 -17"/>    <!-- Annulaire -->
      <path d="M 22 -2 Q 22 -7 22 -12"/>     <!-- Auriculaire -->
    </g>
    
    <!-- === REFLETS (effet métallique) === -->
    <ellipse cx="-10" cy="-10" rx="6" ry="10" fill="white" opacity="0.1"/>
    <ellipse cx="8" cy="-25" rx="3" ry="5" fill="white" opacity="0.15"/>
    
  </g>
</svg>